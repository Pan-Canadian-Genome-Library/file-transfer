###############################################################################
# Profile - common
###############################################################################

server:
  port: 8087
  compression:
    enabled: true
    mime-types: application/json
  #allowedOrigins can be configured to contain multiple values, all separated by commas
  cors:
    allowedOrigins: http://localhost:8081
s3:
  secured: true
  sigV4Enabled: true
  upload.directory: upload
  upload.expiration: 6
  data.directory: data
  # COL-131: Change pre-signed URLs TTL to 1 day max
  download.expiration: 1

  # custom meta property with md5 hash, unused when upload state files are available (default behaviour)
  # customMd5Property: md5chksum

  #amazon
  endpoint: s3-external-1.amazonaws.com

  # an optional override to replace the s3 endpoint, useful to proxy requests
  preSignedUrl:
    override:
      host:

metadata:
  useLegacyMode: false

bucket:
  name.object: pcgl.data
  name.state: pcgl.state
  size.pool: 0
  size.key: 2

object:
  sentinel: heliograph

upload:
  retry.limit: 5
  partsize: 20000000
  connection.timeout: 15000

  # Every day at midnight
  clean.cron: "0 0 0 * * ?"
  clean.enabled: true

auth:
  # Connection retries in case of connection failure
  connection:
    # Max number of retries
    maxRetries: 5

    # Initial timeoutMs before the first retry. In milliseconds.
    initialBackoff: 15000

    # Multiplier that defines value of consequent timeouts before the next retry.
    # E.g. TIMEOUT(n) = TIMEOUT(n-1) * MULTIPLIER
    multiplier: 2.0

#allowedOrigins can be configured to contain multiple values, all separated by commas
management:
  endpoints:
    web:
      cors:
        allowedOrigins: http://localhost:8081

#  SpringBoot >=2.6 default strategy for matching the request path has been changed
#  from antpathmatcher to pathpatternparser
spring:
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher

logging:
  level:
    root: INFO
    org.springframework.web: INFO
---

###############################################################################
# Profile - "test"
###############################################################################

spring:
  config:
    activate:
      on-profile: test

auth:
  server:
    clientID: "clientid"
    provider: ego
    keycloak:
      host: http://localhost
      realm: "myrealm"
    authz:
      host: https://authz.example.com
      admin-group: "PCGL:admin-group-name"
      service-id: SERVICE-LABEL
      service-uuid: 00000000-0000-0000-0000-0000000000000
    scope:
      download:
        system: score.READ
        study:
          prefix: PROGRAMDATA-
          suffix: .READ
      upload:
        system: score.WRITE
        study:
          prefix: PROGRAMDATA-
          suffix: .WRITE